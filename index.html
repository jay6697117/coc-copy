<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>COC Clone — 部落冲突克隆版</title>
    <meta name="description" content="一款浏览器端的策略经营游戏，建造村庄、训练军队、攻击掠夺" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; font-family: 'Outfit', 'Arial', sans-serif; }
      #game-container { width: 100%; height: 100%; position: relative; }

      /* ===== 加载屏 ===== */
      #loading-screen {
        position: fixed; inset: 0; z-index: 999;
        background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3a 50%, #0d0d1a 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: #fff; transition: opacity 0.5s;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      #loading-logo { font-size: 48px; margin-bottom: 16px; animation: logoPulse 2s ease infinite; }
      #loading-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; background: linear-gradient(90deg, #ffd700, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      #loading-bar-bg { width: 200px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
      #loading-bar { width: 0%; height: 100%; border-radius: 3px; background: linear-gradient(90deg, #ffd700, #ff8c00); transition: width 0.3s; }
      #loading-text { margin-top: 12px; font-size: 12px; color: #666; }
      @keyframes logoPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

      /* ===== 面板通用 ===== */
      #build-panel, #train-panel, #deploy-panel {
        position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
        border-top: 2px solid #4a4a6a;
        display: flex; align-items: center; padding: 0 16px; gap: 8px;
        z-index: 100; overflow-x: auto;
        backdrop-filter: blur(12px);
      }
      #build-panel { background: linear-gradient(180deg, rgba(20,20,40,0.85) 0%, rgba(10,10,30,0.92) 100%); }
      #train-panel { display: none; background: linear-gradient(180deg, rgba(20,40,60,0.9) 0%, rgba(10,20,40,0.95) 100%); border-color: #4488cc; }
      #train-panel.show { display: flex; }
      #deploy-panel { display: none; background: linear-gradient(180deg, rgba(40,10,10,0.9) 0%, rgba(20,5,5,0.95) 100%); border-color: #cc3333; }
      #deploy-panel.show { display: flex; }

      /* 按钮基础 */
      .build-btn, .train-btn, .action-btn, .deploy-btn {
        flex-shrink: 0; width: 70px; height: 75px;
        border: 2px solid #444; border-radius: 12px;
        background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
        color: #fff; cursor: pointer;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
        transition: all 0.2s ease; position: relative;
      }
      .build-btn:hover, .train-btn:hover, .action-btn:hover, .deploy-btn:hover {
        border-color: #88f; transform: translateY(-3px); box-shadow: 0 4px 16px rgba(100,100,255,0.2);
      }
      .build-btn.active { border-color: #4f4; background: linear-gradient(180deg, #2a4a2a 0%, #1a3a1a 100%); box-shadow: 0 0 12px rgba(0,255,0,0.2); }
      .build-btn.disabled, .train-btn.disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
      .build-btn .icon, .train-btn .icon, .action-btn .icon, .deploy-btn .icon { font-size: 24px; }
      .build-btn .label, .train-btn .label, .action-btn .label, .deploy-btn .label { font-size: 9px; white-space: nowrap; color: #ccc; }
      .build-btn .cost, .train-btn .cost { font-size: 8px; color: #ffd700; white-space: nowrap; }
      .build-btn .cost.elixir, .train-btn .cost.elixir { color: #e040fb; }
      .deploy-btn { border-color: #cc3333; background: linear-gradient(180deg, #4a2a2a 0%, #3a1a1a 100%); }
      .deploy-btn.active { border-color: #ff0; background: linear-gradient(180deg, #5a4a1a 0%, #4a3a0a 100%); }
      .deploy-btn .count { font-size: 11px; color: #ff8888; font-weight: bold; }
      .action-btn.attack { background: linear-gradient(180deg, #8b2a2a 0%, #5a1a1a 100%); border-color: #ff4444; }
      .action-btn.attack:hover { background: linear-gradient(180deg, #aa3a3a 0%, #7a2a2a 100%); box-shadow: 0 0 16px rgba(255,0,0,0.3); }
      .action-btn.train-tab { background: linear-gradient(180deg, #2a4a6a 0%, #1a3a5a 100%); border-color: #4488cc; }

      /* 资源面板 */
      #resource-panel {
        position: fixed; top: 0; left: 0; right: 0; height: 48px;
        background: linear-gradient(180deg, rgba(10,10,30,0.92) 0%, rgba(20,20,40,0.85) 100%);
        border-bottom: 2px solid #3a3a5a;
        display: flex; align-items: center; padding: 0 16px; gap: 16px;
        z-index: 100; color: #fff; font-size: 13px;
        backdrop-filter: blur(12px);
      }
      .resource-item { display: flex; align-items: center; gap: 4px; }
      .resource-item .icon { font-size: 16px; }
      .resource-item .value { font-weight: 700; }
      .resource-item .cap { color: #666; font-size: 11px; }
      #gold-value { color: #ffd700; }
      #elixir-value { color: #e040fb; }
      #gem-value { color: #4fc3f7; }
      .army-info { color: #aaa; font-size: 12px; }
      .trophy-display { margin-left: auto; color: #ffd700; font-size: 13px; font-weight: 700; cursor: pointer; }
      .trophy-display:hover { text-shadow: 0 0 8px rgba(255,215,0,0.5); }

      /* 提示/Toast */
      #hint-text {
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8); color: #ccc;
        padding: 8px 20px; border-radius: 20px; font-size: 12px;
        z-index: 100; pointer-events: none; transition: all 0.4s ease;
        backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
      }
      #toast-container {
        position: fixed; top: 60px; right: 16px; z-index: 300;
        display: flex; flex-direction: column; gap: 8px; pointer-events: none;
      }
      .toast {
        background: rgba(20,20,40,0.95); border: 1px solid #4a4a6a; border-radius: 12px;
        padding: 10px 16px; color: #fff; font-size: 13px;
        backdrop-filter: blur(12px); box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
        max-width: 280px;
      }
      .toast.success { border-color: #4a9a4a; }
      .toast.error { border-color: #9a4a4a; }
      .toast.achievement { border-color: #ffd700; background: linear-gradient(180deg, rgba(40,35,10,0.95) 0%, rgba(20,18,5,0.95) 100%); }
      @keyframes toastIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-20px); } }

      /* 弹窗基础 */
      .modal {
        display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 320px; max-width: 90vw;
        background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
        border: 2px solid #6a6a9a; border-radius: 16px;
        padding: 24px; z-index: 200; color: #fff;
        box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        backdrop-filter: blur(12px);
      }
      .modal.show { display: block; animation: modalIn 0.25s ease; }
      @keyframes modalIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

      /* 建筑信息 */
      #building-info .info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
      #building-info .info-icon { font-size: 36px; }
      #building-info .info-title { font-size: 18px; font-weight: 700; }
      #building-info .info-level { font-size: 13px; color: #888; }
      #building-info .info-stats { margin-bottom: 16px; font-size: 13px; line-height: 1.8; }
      .stat-label { color: #888; }
      .stat-value { color: #fff; font-weight: 600; }
      .info-actions { display: flex; gap: 8px; }
      .info-btn {
        flex: 1; padding: 10px; border: none; border-radius: 10px;
        color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
        transition: all 0.2s;
      }
      .info-btn:hover { transform: scale(1.03); }
      #info-upgrade-btn { background: linear-gradient(180deg, #4a9a2a 0%, #2a6a1a 100%); }
      #info-upgrade-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none !important; }
      #info-move-btn { background: linear-gradient(180deg, #3a5a9a 0%, #2a3a6a 100%); }
      #info-close-btn { background: linear-gradient(180deg, #6a3a3a 0%, #4a2a2a 100%); }

      /* 遮罩 */
      #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 199; transition: opacity 0.3s; }
      #overlay.show { display: block; }

      /* 搜索框 */
      #search-box {
        display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 280px; padding: 32px 24px;
        background: linear-gradient(180deg, #2a2a4a 0%, #1a1a3a 100%);
        border: 2px solid #6a6a9a; border-radius: 16px;
        z-index: 200; color: #fff; text-align: center;
        box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      }
      #search-box.show { display: block; animation: searchPulse 1s ease infinite; }
      #search-text { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
      #search-trophies { font-size: 13px; color: #ffd700; }
      @keyframes searchPulse { 0%,100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); } 50% { opacity: 1; transform: translate(-50%,-50%) scale(1.02); } }

      /* 战斗 HUD */
      #battle-hud {
        display: none; position: fixed; top: 0; left: 0; right: 0; height: 50px;
        background: linear-gradient(180deg, rgba(60,10,10,0.92) 0%, rgba(40,10,10,0.85) 100%);
        border-bottom: 2px solid #ff4444;
        align-items: center; padding: 0 20px; gap: 16px;
        z-index: 100; color: #fff; font-size: 14px; font-weight: 600;
        backdrop-filter: blur(12px);
      }
      #battle-hud.show { display: flex; }
      .battle-stat { display: flex; align-items: center; gap: 4px; }
      .star { color: #555; font-size: 20px; transition: all 0.3s; }
      .star.earned { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.5); transform: scale(1.2); }
      #end-battle-btn { margin-left: auto; background: linear-gradient(180deg, #cc3333, #992222); border: none; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.2s; }
      #end-battle-btn:hover { transform: scale(1.05); box-shadow: 0 0 12px rgba(255,0,0,0.3); }

      /* 战斗结算 */
      #battle-result { text-align: center; }
      .result-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
      .result-stars { font-size: 36px; margin-bottom: 12px; }
      .result-stats { font-size: 14px; line-height: 2; margin-bottom: 16px; }
      .result-btn { background: linear-gradient(180deg, #3a5a9a 0%, #2a3a6a 100%); padding: 12px; border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; transition: all 0.2s; }
      .result-btn:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }

      /* 设置面板 */
      #settings-panel .settings-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
      #settings-panel .settings-item:last-child { border-bottom: none; }
      .settings-btn { background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%); border: 1px solid #555; color: #fff; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
      .settings-btn:hover { border-color: #888; }
      .settings-btn.danger { border-color: #ff4444; color: #ff4444; }

      /* 统计面板 */
      #stats-panel .stat-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
      #stats-panel .stat-row .stat-name { color: #888; }
      #stats-panel .stat-row .stat-val { color: #fff; font-weight: 600; }

      /* 小地图 */
      #minimap { position: fixed; bottom: 100px; right: 12px; width: 120px; height: 120px; border: 2px solid #4a4a6a; border-radius: 8px; background: #111; z-index: 100; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
      #minimap canvas { width: 100%; height: 100%; border-radius: 6px; }

      /* 法术栏 */
      .spell-btn { flex-shrink: 0; width: 56px; height: 56px; border: 2px solid #9933ff; border-radius: 50%; background: linear-gradient(180deg, #3a1a5a 0%, #2a0a4a 100%); color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; transition: all 0.2s; font-size: 20px; position: relative; }
      .spell-btn:hover { border-color: #cc66ff; transform: scale(1.1); box-shadow: 0 0 12px rgba(153,51,255,0.4); }
      .spell-btn.active { border-color: #ffff00; box-shadow: 0 0 16px rgba(255,255,0,0.4); }
      .spell-btn .spell-charges { position: absolute; top: -4px; right: -4px; background: #ff3333; color: #fff; font-size: 9px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
      .spell-btn.cooldown { opacity: 0.4; cursor: not-allowed; }

      /* 工人信息 */
      .builder-info { color: #88cc88; font-size: 12px; margin-left: 8px; }

      /* 新手引导 */
      #tutorial-panel .tutorial-step { text-align: center; padding: 16px 0; }
      #tutorial-panel .tutorial-icon { font-size: 48px; margin-bottom: 12px; }
      #tutorial-panel .tutorial-text { font-size: 14px; line-height: 1.6; color: #ccc; }
      .tutorial-dots { display: flex; justify-content: center; gap: 8px; margin: 16px 0; }
      .tutorial-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
      .tutorial-dot.active { background: #ffd700; }
    </style>
  </head>
  <body>
    <!-- 加载屏 -->
    <div id="loading-screen">
      <div id="loading-logo">🏰</div>
      <div id="loading-title">部落冲突 · 克隆版</div>
      <div id="loading-bar-bg"><div id="loading-bar"></div></div>
      <div id="loading-text">加载中...</div>
    </div>

    <div id="game-container"></div>

    <!-- 资源面板 -->
    <div id="resource-panel">
      <div class="resource-item"><span class="icon">🪙</span><span class="value" id="gold-value">0</span><span class="cap" id="gold-cap"></span></div>
      <div class="resource-item"><span class="icon">💧</span><span class="value" id="elixir-value">0</span><span class="cap" id="elixir-cap"></span></div>
      <div class="resource-item"><span class="icon">💎</span><span class="value" id="gem-value">0</span></div>
      <div class="army-info" id="army-info">⚔️ 0/20</div>
      <div class="trophy-display" id="trophy-display" title="点击查看统计">🏆 0</div>
    </div>

    <!-- 面板 -->
    <div id="build-panel"></div>
    <div id="hint-text">拖拽平移 | 滚轮缩放 | 点击下方建筑开始建造</div>
    <div id="train-panel"></div>
    <div id="toast-container"></div>

    <!-- 战斗 -->
    <div id="battle-hud">
      <div class="battle-stat">⏱ <span id="battle-timer">3:00</span></div>
      <div class="battle-stat" id="battle-stars">
        <span class="star" id="star1">⭐</span><span class="star" id="star2">⭐</span><span class="star" id="star3">⭐</span>
      </div>
      <div class="battle-stat">💥 <span id="battle-percent">0%</span></div>
      <button id="end-battle-btn">撤退</button>
    </div>
    <div id="deploy-panel"></div>

    <!-- 搜索 -->
    <div id="search-box"><div id="search-text">搜索对手中...</div><div id="search-trophies">🏆 0</div></div>

    <!-- 弹窗 -->
    <div id="overlay"></div>
    <div id="building-info" class="modal">
      <div class="info-header">
        <span class="info-icon" id="info-icon"></span>
        <div><div class="info-title" id="info-title"></div><div class="info-level" id="info-level"></div></div>
      </div>
      <div class="info-stats" id="info-stats"></div>
      <div class="info-actions">
        <button class="info-btn" id="info-upgrade-btn">升级</button>
        <button class="info-btn" id="info-move-btn">移动</button>
        <button class="info-btn" id="info-close-btn">关闭</button>
      </div>
    </div>
    <div id="battle-result" class="modal">
      <div class="result-title" id="result-title">胜利！</div>
      <div class="result-stars" id="result-stars">⭐⭐⭐</div>
      <div class="result-stats" id="result-stats"></div>
      <button class="result-btn" id="result-return-btn">返回村庄</button>
    </div>
    <div id="settings-panel" class="modal">
      <div style="font-size:18px;font-weight:700;margin-bottom:16px">⚙️ 设置</div>
      <div class="settings-item"><span>游戏版本</span><span style="color:#888">v1.0.0</span></div>
      <div class="settings-item"><span>音效</span><button class="settings-btn" id="toggle-audio-btn">开</button></div>
      <div class="settings-item"><span>清除存档</span><button class="settings-btn danger" id="clear-save-btn">清除</button></div>
      <div class="settings-item"><span>关于</span><span style="color:#888">PixiJS + TypeScript</span></div>
      <button class="result-btn" id="settings-close-btn" style="margin-top:16px">关闭</button>
    </div>
    <div id="stats-panel" class="modal">
      <div style="font-size:18px;font-weight:700;margin-bottom:16px">📊 统计</div>
      <div id="stats-content"></div>
      <button class="result-btn" id="stats-close-btn" style="margin-top:16px">关闭</button>
    </div>

    <!-- 小地图 -->
    <div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>
    <div id="fps-counter" style="position:fixed;top:8px;right:12px;font-size:11px;color:rgba(255,255,255,0.4);z-index:100;font-family:monospace">60 FPS</div>

    <!-- 新手引导 -->
    <div id="tutorial-panel" class="modal">
      <div class="tutorial-step" id="tutorial-content"></div>
      <div class="tutorial-dots" id="tutorial-dots"></div>
      <button class="result-btn" id="tutorial-btn">下一步</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
