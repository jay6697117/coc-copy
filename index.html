<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>COC Clone — 部落冲突克隆版</title>
    <meta name="description" content="一款浏览器端的策略经营游戏，建造村庄、训练军队、攻击掠夺" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
      #game-container { width: 100%; height: 100%; position: relative; }
      /* 建造面板 UI */
      #build-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 80px;
        background: rgba(0, 0, 0, 0.85);
        border-top: 2px solid #4a4a6a;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 10px;
        z-index: 100;
        overflow-x: auto;
      }
      .build-btn {
        flex-shrink: 0;
        width: 60px;
        height: 60px;
        border: 2px solid #555;
        border-radius: 8px;
        background: #2a2a4a;
        color: #fff;
        font-size: 10px;
        font-family: 'Arial', sans-serif;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        transition: all 0.2s;
      }
      .build-btn:hover { border-color: #88f; background: #3a3a5a; }
      .build-btn.active { border-color: #4f4; background: #2a4a2a; }
      .build-btn .icon { font-size: 22px; }
      .build-btn .label { font-size: 9px; white-space: nowrap; }
      /* 资源面板 */
      #resource-panel {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: rgba(0, 0, 0, 0.85);
        border-bottom: 2px solid #4a4a6a;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 20px;
        z-index: 100;
        color: #fff;
        font-family: 'Arial', sans-serif;
        font-size: 14px;
      }
      .resource-item { display: flex; align-items: center; gap: 6px; }
      .resource-item .icon { font-size: 16px; }
      .resource-item .value { font-weight: bold; }
      #gold-value { color: #ffd700; }
      #elixir-value { color: #e040fb; }
      #gem-value { color: #4fc3f7; }
      /* 提示文字 */
      #hint-text {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: #aaa;
        padding: 6px 16px;
        border-radius: 16px;
        font-size: 12px;
        font-family: 'Arial', sans-serif;
        z-index: 100;
        pointer-events: none;
        transition: opacity 0.3s;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="resource-panel">
      <div class="resource-item">
        <span class="icon">🪙</span>
        <span class="value" id="gold-value">5000</span>
      </div>
      <div class="resource-item">
        <span class="icon">💧</span>
        <span class="value" id="elixir-value">5000</span>
      </div>
      <div class="resource-item">
        <span class="icon">💎</span>
        <span class="value" id="gem-value">100</span>
      </div>
    </div>
    <div id="build-panel"></div>
    <div id="hint-text">拖拽平移 | 滚轮缩放 | 点击下方建筑开始建造</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
